version: '3.9'

services:

  # ── Database (mirrors RDS Aurora MySQL in dev) ──────────────────────────────
  db:
    image: mysql:8.0
    container_name: 3tier-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: webappdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - db-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── App Tier (Node.js API) ──────────────────────────────────────────────────
  app:
    build:
      context: ./app-tier
      target: production
    container_name: 3tier-app
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_USER: appuser
      DB_PASSWORD: apppass
      DB_NAME: webappdb
      PORT: 4000
      NODE_ENV: production
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
      - db-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Web Tier (React + Nginx) ────────────────────────────────────────────────
  web:
    build:
      context: ./web-tier
      dockerfile: Dockerfile
    container_name: 3tier-web
    restart: unless-stopped
    environment:
      APP_TIER_HOST: app
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
  db-network:
    driver: bridge
