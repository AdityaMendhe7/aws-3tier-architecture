name: Build & Push to ECR

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '18' }
      - run: cd app-tier && npm ci && npm test

  build-and-push:
    name: Build Docker Images & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push App Tier
        run: |
          docker build -t $ECR_REGISTRY/3tier-app:${{ github.sha }} ./app-tier
          docker push     $ECR_REGISTRY/3tier-app:${{ github.sha }}
          docker tag      $ECR_REGISTRY/3tier-app:${{ github.sha }} $ECR_REGISTRY/3tier-app:latest
          docker push     $ECR_REGISTRY/3tier-app:latest

      - name: Build & push Web Tier
        run: |
          docker build -t $ECR_REGISTRY/3tier-web:${{ github.sha }} ./web-tier
          docker push     $ECR_REGISTRY/3tier-web:${{ github.sha }}
          docker tag      $ECR_REGISTRY/3tier-web:${{ github.sha }} $ECR_REGISTRY/3tier-web:latest
          docker push     $ECR_REGISTRY/3tier-web:latest
